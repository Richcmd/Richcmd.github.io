
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow V5</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  background:#020617;
  color:white;
  display:flex;
}

.sidebar{
  width:260px;
  background:#0f172a;
  min-height:100vh;
  padding:25px;
  position:fixed;
  left:0;
  top:0;
  overflow:auto;
}

.logo{
  font-size:28px;
  font-weight:700;
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border:none;
  border-radius:14px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#2563eb;
}

.main{
  margin-left:260px;
  width:calc(100% - 260px);
  padding:30px;
}

.page{
  display:none;
}

.active{
  display:block;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:20px;
}

.card h2{
  margin-top:10px;
}

.topbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

input,select,textarea{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#1e293b;
  color:white;
}

textarea{
  min-height:150px;
}

.primary{
  background:#2563eb;
  border:none;
  color:white;
  border-radius:14px;
  padding:14px;
  cursor:pointer;
}

.tasks-grid,.template-grid,.agf-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.task,.template,.agf-card{
  background:#0f172a;
  padding:20px;
  border-radius:20px;
}

.progress{
  width:100%;
  background:#1e293b;
  height:12px;
  border-radius:20px;
  overflow:hidden;
}

.progress div{
  height:100%;
  background:#2563eb;
}

.chart-box{
  background:#0f172a;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

.delete-btn{
  background:#dc2626;
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
}

.checkbox{
  width:22px;
  height:22px;
}

@media(max-width:900px){
  body{
    flex-direction:column;
  }

  .sidebar{
    position:relative;
    width:100%;
    min-height:auto;
  }

  .main{
    margin-left:0;
    width:100%;
  }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">TaskFlow V5</div>

  <button onclick="showPage('dashboardPage')">📊 Dashboard</button>
  <button onclick="showPage('tasksPage')">✅ Taken</button>
  <button onclick="showPage('calendarPage')">📅 Kalender</button>
  <button onclick="showPage('templatesPage')">📦 Templates</button>
  <button onclick="showPage('reportsPage')">📈 Rapportages</button>
  <button onclick="showPage('shiftPage')">🧾 Shifts</button>
  <button onclick="showPage('agfPage')">🥦 AGF</button>
  <button onclick="showPage('goalsPage')">🏆 Goals & Ranks</button>
  <button onclick="showPage('notesPage')">📝 Notities</button>
</div>

<div class="main">

<div class="page active" id="dashboardPage">
  <h1>Dashboard</h1>

  <div class="stats-grid">
    <div class="card">
      <small>Productiviteit</small>
      <h2 id="dashboardProductivity">0%</h2>
    </div>

    <div class="card">
      <small>Punten</small>
      <h2 id="dashboardPoints">0</h2>
    </div>

    <div class="card">
      <small>Beschikbare Uren</small>
      <h2 id="dashboardHours">0u</h2>
    </div>

    <div class="card">
      <small>Rank</small>
      <h2 id="dashboardRank">Beginner</h2>
    </div>
  </div>

  <div class="card">
    <h3>Progressie</h3>
    <br>
    <div class="progress">
      <div id="rankProgress" style="width:20%;"></div>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="dashboardChart"></canvas>
  </div>
</div>

<div class="page" id="tasksPage">
  <h1>Taken</h1>

  <div class="topbar">
    <input type="text" id="taskTitle" placeholder="Taak naam">
    <input type="time" id="taskTime">
    <input type="number" id="taskDuration" placeholder="Minuten">
    <input type="number" id="taskPoints" placeholder="Punten">
    <input type="date" id="taskDate">

    <select id="taskRepeat">
      <option value="daily">Dagelijks</option>
      <option value="weekly">Wekelijks</option>
      <option value="monthly">Maandelijks</option>
    </select>

    <button class="primary" onclick="addTask()">Toevoegen</button>
  </div>

  <div class="topbar">
    <select id="taskFilter" onchange="renderTasks()">
      <option value="all">Alle Taken</option>
      <option value="daily">Dagelijks</option>
      <option value="weekly">Wekelijks</option>
      <option value="monthly">Maandelijks</option>
    </select>
  </div>

  <div class="tasks-grid" id="taskList"></div>
</div>

<div class="page" id="calendarPage">
  <h1>Kalender</h1>

  <div class="topbar">
    <button class="primary" onclick="changeCalendarDay(-1)">⬅</button>
    <input type="date" id="calendarDate">
    <button class="primary" onclick="changeCalendarDay(1)">➡</button>
  </div>

  <div class="tasks-grid" id="calendarTaskList"></div>
</div>

<div class="page" id="templatesPage">
  <h1>Templates</h1>

  <div class="topbar">
    <input type="text" id="templateName" placeholder="Template naam">
    <input type="text" id="templateTaskTitle" placeholder="Taak naam">
    <input type="time" id="templateTaskTime">
    <input type="number" id="templateTaskDuration" placeholder="Minuten">
    <button class="primary" onclick="createTemplateTask()">Toevoegen</button>
  </div>

  <div class="template-grid" id="templateList"></div>
</div>

<div class="page" id="reportsPage">
  <h1>Rapportages</h1>

  <div class="topbar">
    <select id="reportType">
      <option value="day">Dag</option>
      <option value="week">Week</option>
      <option value="month">Maand</option>
    </select>

    <button class="primary" onclick="generateReport()">Genereren</button>
  </div>

  <div class="stats-grid">
    <div class="card">
      <small>Score</small>
      <h2 id="reportScore">0%</h2>
    </div>

    <div class="card">
      <small>Punten</small>
      <h2 id="reportPoints">0</h2>
    </div>

    <div class="card">
      <small>Tijd</small>
      <h2 id="reportHours">0u</h2>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="reportChart"></canvas>
  </div>
</div>
