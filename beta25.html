<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Workflow OS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b0f17; color:white; }
.glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }

.sidebar {
  transition: transform 0.3s ease;
}

.hiddenTab { display:none; }
.activeBtn { background: rgba(255,255,255,0.1); }
</style>
</head>

<body class="flex overflow-x-hidden">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar fixed lg:static z-50 w-72 h-screen bg-black/80 p-4 transform -translate-x-full lg:translate-x-0">

<h1 class="text-2xl font-bold mb-6">Workflow OS</h1>

<button onclick="nav('dashboard')" class="w-full text-left p-3 rounded-xl">Dashboard</button>
<button onclick="nav('haccp')" class="w-full text-left p-3 rounded-xl">HACCP</button>
<button onclick="nav('agf')" class="w-full text-left p-3 rounded-xl">AGF</button>
<button onclick="nav('rapport')" class="w-full text-left p-3 rounded-xl">Rapport</button>
<button onclick="nav('notities')" class="w-full text-left p-3 rounded-xl">Notities</button>
<button onclick="nav('communicatie')" class="w-full text-left p-3 rounded-xl">Communicatie</button>
<button onclick="nav('visual')" class="w-full text-left p-3 rounded-xl">Visualisatie</button>
<button onclick="nav('instellingen')" class="w-full text-left p-3 rounded-xl">Instellingen</button>

</div>

<!-- MAIN -->
<div class="flex-1 p-4 lg:p-8">

<!-- TOPBAR -->
<div class="flex justify-between items-center mb-6">
<button onclick="toggleMenu()" class="lg:hidden px-4 py-2 bg-white/10 rounded-xl">☰</button>
<h2 id="title">Dashboard</h2>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">

<div class="glass p-4 rounded-xl mb-4">
<h3>Welkom <span id="username">Gebruiker</span></h3>
<p id="motivation"></p>
</div>

<div class="grid md:grid-cols-3 gap-4">
<div class="glass p-4 rounded-xl">Taken: <span id="taskCount">0</span></div>
<div class="glass p-4 rounded-xl">AGF: <span id="agfCount">0</span></div>
<div class="glass p-4 rounded-xl">Rapporten: <span id="reportCount">0</span></div>
</div>

</div>

<!-- HACCP -->
<div id="haccp" class="tab hiddenTab">

<h3 class="text-xl mb-2">HACCP Taken</h3>

<div class="glass p-4 rounded-xl mb-4">
<input id="taskInput" placeholder="Taak" class="w-full p-2 text-black mb-2"/>
<select id="freq" class="w-full p-2 text-black mb-2">
<option>Geen</option>
<option>Dagelijks</option>
<option>Wekelijks</option>
<option>Maandelijks</option>
</select>
<button onclick="addTask()" class="bg-green-500 px-4 py-2 rounded">Toevoegen</button>
</div>

<div id="taskList"></div>

</div>

<!-- AGF -->
<div id="agf" class="tab hiddenTab">

<h3 class="text-xl mb-2">AGF Controle</h3>

<div class="glass p-4 rounded-xl mb-4">
<input id="agfInput" placeholder="Product" class="w-full p-2 text-black mb-2"/>
<select id="agfType" class="w-full p-2 text-black mb-2">
<option>Overvoorraad</option>
<option>Leeg schap</option>
<option>OK</option>
</select>
<button onclick="addAGF()" class="bg-green-500 px-4 py-2 rounded">Toevoegen</button>
</div>

<div id="agfList"></div>

</div>

<!-- RAPPORT -->
<div id="rapport" class="tab hiddenTab">

<h3>Rapportage</h3>

<div class="glass p-4 rounded-xl mb-4">
<input id="reportText" class="w-full p-2 text-black mb-2" placeholder="Notitie"/>
<select id="reportColor" class="w-full p-2 text-black mb-2">
<option>Groen</option>
<option>Geel</option>
<option>Oranje</option>
<option>Rood</option>
</select>
<button onclick="addReport()" class="bg-green-500 px-4 py-2 rounded">Opslaan</button>
</div>

<div id="reportList"></div>

</div>

<!-- NOTITIES -->
<div id="notities" class="tab hiddenTab">

<h3>Notities</h3>
<textarea id="noteInput" class="w-full p-2 text-black"></textarea>
<button onclick="addNote()" class="bg-green-500 px-4 py-2 rounded mt-2">Opslaan</button>

<div id="notes"></div>

</div>

<!-- COMMUNICATIE -->
<div id="communicatie" class="tab hiddenTab">

<h3>Communicatie</h3>

<input id="commPerson" placeholder="Persoon" class="w-full p-2 text-black mb-2"/>
<textarea id="commMsg" class="w-full p-2 text-black mb-2"></textarea>
<button onclick="addComm()" class="bg-green-500 px-4 py-2 rounded">Verstuur</button>

<div id="commList"></div>

</div>

<!-- VISUAL -->
<div id="visual" class="tab hiddenTab">

<h3>Visualisatie</h3>
<canvas id="chart"></canvas>

</div>

<!-- INSTELLINGEN -->
<div id="instellingen" class="tab hiddenTab">

<h3>Instellingen</h3>

<input id="nameInput" placeholder="Naam" class="w-full p-2 text-black mb-2"/>
<button onclick="saveSettings()" class="bg-green-500 px-4 py-2 rounded">Opslaan</button>

</div>

</div>

<script>

let state = {
 tasks: [],
 agf: [],
 reports: [],
 notes: [],
 comm: [],
 name: "Gebruiker"
};

function save(){
 localStorage.setItem("app", JSON.stringify(state));
 update();
}

function load(){
 let data = localStorage.getItem("app");
 if(data) state = JSON.parse(data);
}

function nav(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.add("hiddenTab"));
 document.getElementById(id).classList.remove("hiddenTab");
 document.getElementById("title").innerText = id;
 if(window.innerWidth < 1024) toggleMenu();
}

function toggleMenu(){
 let s = document.getElementById("sidebar");
 if(s.classList.contains("-translate-x-full")){
   s.classList.remove("-translate-x-full");
 } else {
   s.classList.add("-translate-x-full");
 }
}

function addTask(){
 state.tasks.push({
  text:taskInput.value,
  freq:freq.value,
  status:"open"
 });
 taskInput.value="";
 save();
}

function addAGF(){
 state.agf.push({
  name:agfInput.value,
  type:agfType.value
 });
 agfInput.value="";
 save();
}

function addReport(){
 state.reports.push({
  text:reportText.value,
  color:reportColor.value
 });
 reportText.value="";
 save();
}

function addNote(){
 state.notes.push(noteInput.value);
 noteInput.value="";
 save();
}

function addComm(){
 state.comm.push({
  person:commPerson.value,
  msg:commMsg.value
 });
 save();
}

function saveSettings(){
 state.name = nameInput.value;
 save();
}

function update(){

username.innerText = state.name;

taskCount.innerText = state.tasks.length;
agfCount.innerText = state.agf.length;
reportCount.innerText = state.reports.length;

taskList.innerHTML = state.tasks.map(t=>`<div class='glass p-2 mb-2'>${t.text} (${t.freq})</div>`).join("");

agfList.innerHTML = state.agf.map(a=>`<div class='glass p-2 mb-2'>${a.name} - ${a.type}</div>`).join("");

reportList.innerHTML = state.reports.map(r=>`<div class='glass p-2 mb-2'>${r.text} - ${r.color}</div>`).join("");

notes.innerHTML = state.notes.map(n=>`<div class='glass p-2 mb-2'>${n}</div>`).join("");

commList.innerHTML = state.comm.map(c=>`<div class='glass p-2 mb-2'>${c.person}: ${c.msg}</div>`).join("");

motivation.innerText = "Blijf gefocust en consistent ⚡";

}

load();
update();
nav("dashboard");

new Chart(document.getElementById("chart"), {
 type:"line",
 data:{
 labels:["Ma","Di","Wo","Do","Vr"],
 datasets:[{
 label:"Productiviteit",
 data:[10,20,30,40,50]
 }]
 }
});

</script>

</body>
</html>
